services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: webdav-azurite
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --skipApiVersionCheck
    volumes:
      - azurite-data:/data

  createcontainer:
    image: mcr.microsoft.com/azure-cli:latest
    container_name: webdav-azurite-init
    depends_on:
      - azurite
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      AZURE_CONTAINER: ${AZURE_CONTAINER:-webdav}
    entrypoint: >
      /bin/sh -c "
      until az storage container create --name $${AZURE_CONTAINER} >/dev/null 2>&1; do sleep 1; done;
      echo 'container ready: '$${AZURE_CONTAINER};
      "

volumes:
  azurite-data:

version: "3"

vars:
  CMD: ./cmd/server

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  run:
    desc: Run the server locally (loads .env)
    dotenv: [".env"]
    cmd: go run {{.CMD}}

  test:
    desc: Run all tests
    cmd: go test -race -count=1 ./...

  deps:
    desc: Download Go module dependencies
    cmd: go mod download

  deps-update:
    desc: Upgrade all dependencies to latest and tidy
    cmds:
      - go get -u ./...
      - go mod tidy

  lint:
    desc: Run golangci-lint
    cmd: golangci-lint run ./...

  lint-install:
    desc: Install golangci-lint (dev only)
    cmd: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

  quality:
    desc: Run linter, vet, and tests (mirrors the CI quality workflow)
    cmds:
      - go vet ./...
      - golangci-lint run ./...
      - go test -race -count=1 -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  minio-up:
    desc: Start a local MinIO instance (S3-compatible)
    cmds:
      - docker run -d --name minio
          -p 9000:9000 -p 9001:9001
          -e MINIO_ROOT_USER=minioadmin
          -e MINIO_ROOT_PASSWORD=minioadmin
          minio/minio server /data --console-address ":9001"
      - echo "MinIO API → http://localhost:9000"
      - echo "MinIO UI  → http://localhost:9001  (minioadmin / minioadmin)"

  minio-down:
    desc: Stop and remove the local MinIO instance
    cmd: docker rm -f minio

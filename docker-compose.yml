services:
  webdav:
    image: ghcr.io/vaggeliskls/cloud-webdav-server:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./webdav-data:/data
      - ./keys/:/keys
    env_file:
      - .env
    environment:
      LOCAL_DATA_PATH: /data
      GOOGLE_APPLICATION_CREDENTIALS: /keys/creds.json
    healthcheck:
      test: ["CMD", "/webdav-server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

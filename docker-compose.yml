services:
  webdav:
    image: ghcr.io/vaggeliskls/clouddav:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./webdav-data:/data
      - ./keys/:/keys
    env_file:
      - .env
    environment:
      LOCAL_DATA_PATH: /data
      GOOGLE_APPLICATION_CREDENTIALS: /keys/creds.json
    restart: unless-stopped

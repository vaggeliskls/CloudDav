services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: webdav-fake-gcs
    ports:
      - "4443:4443"
    # memory backend: fake-gcs's filesystem backend silently drops object
    # names ending in "/", which breaks our directory-marker scheme.
    command:
      - -scheme
      - http
      - -host
      - 0.0.0.0
      - -port
      - "4443"
      - -public-host
      - localhost:4443
      - -backend
      - memory

  createbucket:
    image: curlimages/curl:latest
    container_name: webdav-fake-gcs-init
    depends_on:
      - fake-gcs
    entrypoint:
      - /bin/sh
      - -c
      - |
        until curl -sf "http://fake-gcs:4443/storage/v1/b?project=test-project" >/dev/null 2>&1; do sleep 1; done
        curl -s -X POST -H "Content-Type: application/json" -d '{"name":"${GCS_BUCKET:-webdav}"}' "http://fake-gcs:4443/storage/v1/b?project=test-project" >/dev/null
        echo "bucket ready: ${GCS_BUCKET:-webdav}"

